name: Test Cisco IOS compliance demo

on:
  workflow_dispatch:
    inputs:
      fail_on_noncompliance:
        description: Fail workflow when controls are non-compliant
        required: false
        default: false
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SANDBOX_HOST: ${{ secrets.SANDBOX_HOST }}
      SANDBOX_USER: ${{ secrets.SANDBOX_USER }}
      SANDBOX_PASSWORD: ${{ secrets.SANDBOX_PASSWORD }}
      ANSIBLE_HOST_KEY_CHECKING: "False"

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Ansible and collections
        run: |
          python -m pip install --upgrade pip
          pip install "ansible>=9,<11" paramiko ansible-pylibssh
          ansible-galaxy collection install cisco.ios ansible.netcommon

      - name: Validate that secrets are present
        run: |
          test -n "$SANDBOX_HOST"
          test -n "$SANDBOX_USER"
          test -n "$SANDBOX_PASSWORD"

      - name: Run compliance playbook
        run: |
          ansible-playbook playbooks/compliance_demo.yml -e "fail_on_noncompliance=${{ inputs.fail_on_noncompliance }}"
