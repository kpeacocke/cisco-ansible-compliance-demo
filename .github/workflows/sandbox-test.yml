name: Test Cisco IOS compliance demo

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SANDBOX_HOST: ${{ secrets.SANDBOX_HOST }}
      SANDBOX_USER: ${{ secrets.SANDBOX_USER }}
      SANDBOX_PASSWORD: ${{ secrets.SANDBOX_PASSWORD }}
      ANSIBLE_HOST_KEY_CHECKING: "False"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible and collections
        run: |
          python -m pip install --upgrade pip
          pip install "ansible>=9,<11" paramiko
          ansible-galaxy collection install cisco.ios ansible.netcommon

      - name: Validate that secrets are present
        run: |
          test -n "$SANDBOX_HOST"
          test -n "$SANDBOX_USER"
          test -n "$SANDBOX_PASSWORD"

      - name: Run compliance playbook
        run: |
          ansible-playbook playbooks/compliance_demo.yml